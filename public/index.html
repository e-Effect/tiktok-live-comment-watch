<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TikTok LIVE コメント計測</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <h1>TikTok LIVE コメント計測</h1>
        <form id="connectForm" class="form">
          <label for="username">TikTok ID</label>
          <div class="row">
            <input id="username" name="username" list="recentIds" autocomplete="off" placeholder="@username" required>
            <datalist id="recentIds"></datalist>
            <button type="submit">接続</button>
          </div>
          <div id="recentIdList" class="recent-list" aria-label="最近使ったID"></div>
        </form>
        <div class="actions">
          <button id="stopBtn" type="button" disabled>停止</button>
          <a id="exportLink" class="disabled" aria-disabled="true">CSV出力</a>
        </div>

        <section class="view-settings" aria-label="表示項目">
          <h2>表示項目</h2>
          <label><input type="checkbox" data-panel-toggle="comments" checked> コメント</label>
          <label><input type="checkbox" data-panel-toggle="watchers" checked> 滞在時間ランキング</label>
          <label><input type="checkbox" data-panel-toggle="silent" checked> 15分以上・コメントなし</label>
          <label><input type="checkbox" data-panel-toggle="gifts" checked> ギフトランキング</label>
          <label><input type="checkbox" data-panel-toggle="users" checked> ユーザー別コメント数</label>
          <label><input type="checkbox" data-panel-toggle="giftHistory" checked> ギフト履歴</label>
        </section>
      </section>

      <section class="dashboard" aria-live="polite">
        <div class="status">
          <span id="statusDot"></span>
          <span id="statusText">未接続</span>
          <strong id="modeText">待機中</strong>
        </div>

        <div class="metrics">
          <article><span>コメント数</span><strong id="commentCount">0</strong></article>
          <article><span>ギフト数</span><strong id="giftCount">0</strong></article>
          <article><span>推定ダイヤ</span><strong id="giftDiamonds">0</strong></article>
          <article><span>計測時間</span><strong id="elapsedTime">00:00</strong></article>
          <article><span>現在視聴</span><strong id="currentViewers">-</strong></article>
          <article><span>推定滞在</span><strong id="watchTime">-</strong></article>
        </div>

        <div class="grid">
          <section data-panel="comments">
            <h2>コメント</h2>
            <div id="commentList" class="list">
              <p class="empty">接続するとコメントがここに流れます。</p>
            </div>
          </section>

          <section data-panel="watchers">
            <h2>滞在時間ランキング</h2>
            <div id="watcherList" class="list small">
              <p class="empty">まだ滞在時間はありません。</p>
            </div>
          </section>

          <section data-panel="silent">
            <h2>15分以上・コメントなし</h2>
            <div id="silentList" class="list small">
              <p class="empty">まだ対象者はいません。</p>
            </div>
          </section>

          <section data-panel="gifts">
            <h2>ギフトランキング</h2>
            <div id="giftList" class="list small">
              <p class="empty">まだギフトはありません。</p>
            </div>
          </section>

          <section data-panel="users">
            <h2>ユーザー別コメント数</h2>
            <div id="userList" class="list small">
              <p class="empty">まだ集計はありません。</p>
            </div>
          </section>

          <section data-panel="giftHistory">
            <h2>ギフト履歴</h2>
            <div id="giftHistory" class="list small">
              <p class="empty">ギフトが届くとここに表示されます。</p>
            </div>
          </section>
        </div>
      </section>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>
